
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{background:#111;border-radius:16px;display:flex;flex-direction:row;min-height:340px;overflow:hidden;font-family:var(--font-sans);}
.col-left{width:170px;min-width:170px;background:#1a1a1a;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;padding:10px 8px;gap:7px;}
.app-title{font-size:11px;font-weight:500;color:#E24B4A;letter-spacing:0.08em;text-transform:uppercase;padding:0 2px 6px;border-bottom:1px solid #2a2a2a;margin-bottom:2px;display:flex;align-items:center;gap:5px;}
.zone-label{font-size:10px;color:#555;letter-spacing:0.07em;text-transform:uppercase;padding:0 2px;}
.zone-btn{background:#222;border:1px solid #333;border-radius:10px;padding:9px 8px;cursor:pointer;display:flex;align-items:center;gap:8px;width:100%;transition:background 0.1s,border-color 0.1s;text-align:left;}
.zone-btn:active{transform:scale(0.97);}
.zone-btn.sel{background:#1c2a1c;border-color:#639922;}
.zone-emoji{font-size:19px;flex-shrink:0;line-height:1;}
.zone-name{font-size:13px;font-weight:500;color:#ddd;display:block;}
.zone-sub{font-size:10px;color:#666;display:block;}
.go-btn{margin-top:auto;background:#E24B4A;border:none;border-radius:10px;padding:12px 8px;cursor:pointer;font-size:14px;font-weight:500;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;width:100%;}
.go-btn:disabled{background:#2a2a2a;color:#444;cursor:not-allowed;}
.go-btn:not(:disabled):active{background:#A32D2D;transform:scale(0.98);}

.col-right{flex:1;min-width:0;display:flex;flex-direction:column;padding:12px 12px 10px;overflow-y:auto;gap:10px;}
.idle-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.idle-state i{font-size:38px;color:#333;}
.idle-state p{font-size:13px;color:#444;text-align:center;}

.result-wrap{display:none;flex-direction:column;gap:10px;}
.result-wrap.show{display:flex;}

.top-row{display:flex;gap:10px;align-items:flex-start;}
.diag-block{flex:1;min-width:0;}
.res-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:4px;}
.res-badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:99px;letter-spacing:0.04em;}
.res-reset{background:transparent;border:1px solid #333;border-radius:7px;padding:4px 8px;font-size:11px;color:#555;cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap;}
.res-reset:active{background:#1a1a1a;}
.res-title{font-size:22px;font-weight:500;line-height:1.1;}
.res-zone{font-size:11px;margin-top:2px;margin-bottom:8px;}
.res-divider{height:1px;background:#222;margin-bottom:6px;}
.res-steps-label{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:5px;}
.steps-list{display:flex;flex-direction:column;gap:6px;list-style:none;padding:0;}
.step-item{display:flex;align-items:flex-start;gap:7px;font-size:11px;line-height:1.35;}
.step-num{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;margin-top:1px;}

/* MCC table */
.mcc-table{display:flex;flex-direction:column;gap:6px;min-width:200px;max-width:220px;}
.mcc-col{border-radius:9px;padding:8px 9px;display:flex;flex-direction:column;gap:4px;}
.mcc-col.green{background:#0D2A0D;border:1px solid #3B6D11;}
.mcc-col.orange{background:#1f1500;border:1px solid #854F0B;}
.mcc-col.red{background:#1a0d0d;border:1px solid #791F1F;}
.mcc-head{font-size:11px;font-weight:500;display:flex;align-items:center;gap:5px;}
.mcc-col.green .mcc-head{color:#97C459;}
.mcc-col.orange .mcc-head{color:#EF9F27;}
.mcc-col.red .mcc-head{color:#E24B4A;}
.mcc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mcc-col.green .mcc-dot{background:#97C459;}
.mcc-col.orange .mcc-dot{background:#EF9F27;}
.mcc-col.red .mcc-dot{background:#E24B4A;}
.mcc-section{margin-top:3px;}
.mcc-section-label{font-size:9px;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:2px;}
.mcc-col.green .mcc-section-label{color:#3B6D11;}
.mcc-col.orange .mcc-section-label{color:#854F0B;}
.mcc-col.red .mcc-section-label{color:#791F1F;}
.mcc-item{font-size:10px;line-height:1.35;padding-left:8px;position:relative;}
.mcc-item::before{content:'·';position:absolute;left:0;}
.mcc-col.green .mcc-item{color:#97C459;}
.mcc-col.orange .mcc-item{color:#EF9F27;}
.mcc-col.red .mcc-item{color:#E24B4A;}

/* Timer */
#timer-block{background:#1a1a1a;border:1px solid #3C3489;border-radius:10px;padding:9px 12px;display:none;align-items:center;gap:10px;}
#timer-block.show{display:flex;}
#timer-digits{font-size:22px;font-weight:500;color:#7F77DD;min-width:50px;font-variant-numeric:tabular-nums;}
#timer-sublabel{font-size:10px;color:#534AB7;margin-top:2px;}
.timer-bar-wrap{flex:1;height:5px;background:#2a2a2a;border-radius:99px;overflow:hidden;}
#timer-bar{height:5px;background:#7F77DD;border-radius:99px;width:100%;transition:width 1s linear,background 1s;}

/* Verdict */
#verdict{display:none;border-radius:10px;padding:12px;text-align:center;flex-direction:column;align-items:center;gap:5px;}
#verdict.show{display:flex;}
#verdict.alive{background:#0D2A0D;border:1px solid #3B6D11;}
#verdict.dead{background:#1a0d0d;border:1px solid #791F1F;}
.verdict-title{font-size:17px;font-weight:500;}
#verdict.alive .verdict-title{color:#97C459;}
#verdict.dead .verdict-title{color:#E24B4A;}
.verdict-sub{font-size:11px;}
#verdict.alive .verdict-sub{color:#3B6D11;}
#verdict.dead .verdict-sub{color:#A32D2D;}

/* Themes */
.t-hemo .res-badge{background:#791F1F;color:#F7C1C1;}
.t-hemo .res-title{color:#E24B4A;}
.t-hemo .res-zone{color:#A32D2D;}
.t-hemo .res-steps-label{color:#A32D2D;}
.t-hemo .step-num{background:#791F1F;color:#F7C1C1;}
.t-hemo .step-item{color:#ccc;}
.t-frac .res-badge{background:#633806;color:#FAC775;}
.t-frac .res-title{color:#EF9F27;}
.t-frac .res-zone{color:#854F0B;}
.t-frac .res-steps-label{color:#854F0B;}
.t-frac .step-num{background:#633806;color:#FAC775;}
.t-frac .step-item{color:#ccc;}
.t-pneu .res-badge{background:#0C447C;color:#B5D4F4;}
.t-pneu .res-title{color:#378ADD;}
.t-pneu .res-zone{color:#185FA5;}
.t-pneu .res-steps-label{color:#185FA5;}
.t-pneu .step-num{background:#0C447C;color:#B5D4F4;}
.t-pneu .step-item{color:#ccc;}
.t-card .res-badge{background:#3C3489;color:#CECBF6;}
.t-card .res-title{color:#7F77DD;}
.t-card .res-zone{color:#534AB7;}
.t-card .res-steps-label{color:#534AB7;}
.t-card .step-num{background:#3C3489;color:#CECBF6;}
.t-card .step-item{color:#ccc;}
.t-tete .res-badge{background:#444441;color:#D3D1C7;}
.t-tete .res-title{color:#B4B2A9;}
.t-tete .res-zone{color:#888780;}
.t-tete .res-steps-label{color:#888780;}
.t-tete .step-num{background:#444441;color:#D3D1C7;}
.t-tete .step-item{color:#ccc;}
</style>

<div class="wrap">
  <h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Application medic milsim diagnostic blessure avec tableau TCCC</h2>

  <div class="col-left">
    <div class="app-title"><i class="ti ti-heart-plus" aria-hidden="true" style="font-size:13px"></i> Medic</div>
    <p class="zone-label">Zone touchée</p>
    <button class="zone-btn" id="btn-bras" onclick="sel('bras')"><span class="zone-emoji">💪</span><span><span class="zone-name">Bras</span><span class="zone-sub">membre sup.</span></span></button>
    <button class="zone-btn" id="btn-jambe" onclick="sel('jambe')"><span class="zone-emoji">🦵</span><span><span class="zone-name">Jambe</span><span class="zone-sub">membre inf.</span></span></button>
    <button class="zone-btn" id="btn-buste" onclick="sel('buste')"><span class="zone-emoji">🫁</span><span><span class="zone-name">Buste</span><span class="zone-sub">torse / poitrine</span></span></button>
    <button class="zone-btn" id="btn-dos" onclick="sel('dos')"><span class="zone-emoji">🫀</span><span><span class="zone-name">Dos</span><span class="zone-sub">région dorsale</span></span></button>
    <button class="zone-btn" id="btn-tete" onclick="sel('tete')"><span class="zone-emoji">🪖</span><span><span class="zone-name">Tête</span><span class="zone-sub">crânien / facial</span></span></button>
    <button class="go-btn" id="go-btn" onclick="diagnose()" disabled><i class="ti ti-stethoscope" aria-hidden="true"></i> Analyser</button>
  </div>

  <div class="col-right">
    <div class="idle-state" id="idle">
      <i class="ti ti-first-aid-kit" aria-hidden="true"></i>
      <p>Sélectionne une zone<br>puis appuie sur Analyser</p>
    </div>

    <div class="result-wrap" id="result-wrap">
      <div class="top-row">
        <div class="diag-block" id="diag-block">
          <div class="res-top">
            <span class="res-badge" id="res-badge"></span>
            <button class="res-reset" onclick="reset(true)"><i class="ti ti-refresh" aria-hidden="true" style="font-size:11px"></i> Reset</button>
          </div>
          <div class="res-title" id="res-title"></div>
          <div class="res-zone" id="res-zone"></div>
          <div class="res-divider"></div>
          <div class="res-steps-label">Protocole de soin</div>
          <ul class="steps-list" id="steps-list"></ul>
        </div>
        <div class="mcc-table" id="mcc-table"></div>
      </div>

      <div id="timer-block">
        <div>
          <div id="timer-digits">3:00</div>
          <div id="timer-sublabel">MCE en cours…</div>
        </div>
        <div class="timer-bar-wrap"><div id="timer-bar"></div></div>
      </div>
      <div id="verdict">
        <i id="verdict-icon" aria-hidden="true" style="font-size:26px"></i>
        <div class="verdict-title" id="verdict-title"></div>
        <div class="verdict-sub" id="verdict-sub"></div>
      </div>
    </div>
  </div>
</div>

<script>
const ZONES={
  bras:{label:'Bras (membre supérieur)',type:'membre'},
  jambe:{label:'Jambe (membre inférieur)',type:'membre'},
  buste:{label:'Buste / Poitrine',type:'tronc'},
  dos:{label:'Dos / Région dorsale',type:'tronc'},
  tete:{label:'Tête',type:'tete'},
};

const MCC_DATA={
  membre:{
    green:{label:'MCC',cols:[
      {title:'Pathologie',items:['Touche aux membres']},
      {title:'Fonctions',items:['Soins']},
      {title:'Gestes',items:['MARCH','Réaliser les soins nécessaires','Remplir la TCCC Carte','Reprise combat ou EVASAN']},
    ]},
    orange:{label:'MCL',cols:[
      {title:'Pathologie',items:['2e touche membres']},
      {title:'Fonctions',items:['Soins','Protocole antalgique']},
      {title:'Gestes',items:['MARCH','Réaliser les soins nécessaires','Administrer morphine','Remplir la TCCC Carte','EVASAN']},
    ]},
    red:{label:'DCD',cols:[
      {title:'Pathologie',items:['3e touche membres']},
      {title:'Fonctions',items:['Rendre compte']},
      {title:'Gestes',items:['N/A']},
    ]},
  },
  tronc:{
    green:{label:'MCC',cols:[
      {title:'Pathologie',items:['1re touche sur protection balistique']},
      {title:'Fonctions',items:['Vérification saignement','Rendre compte']},
      {title:'Gestes',items:['MARCH','Vérifier si protection non transpercée','Reprise combat']},
    ]},
    orange:{label:'MCL',cols:[
      {title:'Pathologie',items:['1re touche sans protection']},
      {title:'Fonctions',items:['Soins','Protocole antalgique']},
      {title:'Gestes',items:['Réaliser les soins nécessaires','Administrer morphine','EVASAN (selon blessure)','Remplir la TCCC Carte']},
    ]},
    red:{label:'DEAD',cols:[
      {title:'Pathologie',items:['3e touche membres']},
      {title:'Fonctions',items:['Rendre compte']},
      {title:'Gestes',items:['N/A']},
    ]},
  },
  tete:{
    green:{label:'MCC',cols:[
      {title:'Pathologie',items:['1re touche sur protection balistique']},
      {title:'Fonctions',items:['Vérification saignement','Vérification cognitive','Rendre compte']},
      {title:'Gestes',items:['MARCH','Vérifier si protection non transpercée','Vérification cognitive','Reprise combat']},
    ]},
    orange:{label:'MCL',cols:[
      {title:'Pathologie',items:['N/A']},
      {title:'Fonctions',items:['N/A']},
      {title:'Gestes',items:['N/A']},
    ]},
    red:{label:'DEAD',cols:[
      {title:'Pathologie',items:['1re touche sans protection balistique','2e touche sur protection déjà touchée']},
      {title:'Fonctions',items:['Rendre compte']},
      {title:'Gestes',items:['N/A']},
    ]},
  },
};

const BLESSURES={
  membre:[
    {key:'hemo',theme:'t-hemo',badge:'Blessure courante',label:'Hémorragie',prob:0.90,steps:["Poser un garrot au-dessus de la blessure","Noter l'heure de pose du garrot","Comprimer si garrot non applicable","Surveiller les signes vitaux","Évacuer vers le medic supérieur"]},
    {key:'frac',theme:'t-frac',badge:'Blessure rare',label:'Fracture',prob:0.10,steps:["Immobiliser le membre avec une attelle","Ne pas tenter de remettre en place","Vérifier la circulation distale (pouls)","Soutenir et stabiliser le blessé","Évacuer vers le medic supérieur"]},
  ],
  tronc:[
    {key:'hemo',theme:'t-hemo',badge:'Blessure courante',label:'Hémorragie',prob:0.80,steps:["Packing avec compresse hémostatique","Maintenir une pression ferme et continue","Surveiller saturation et fréquence cardiaque","Ne pas retirer si compresse saturée","Évacuation d'urgence immédiate"]},
    {key:'pneu',theme:'t-pneu',badge:'Blessure grave',label:'Pneumothorax',prob:0.15,steps:["Identifier : respiration difficile, douleur thoracique","Appliquer pansement thoracique occlusif (valve)","Placer en position semi-assise","Surveiller la détresse respiratoire","Évacuation d'urgence immédiate"]},
    {key:'card',theme:'t-card',badge:'⚠ Urgence absolue',label:'Arrêt cardiaque',prob:0.05,steps:["Vérifier conscience et respiration","Déclencher l'alerte équipe immédiatement","Commencer le MCE","30 compressions / 2 insufflations","Maintenir jusqu'au verdict — 3 min"]},
  ],
  tete:[
    {key:'nosang',theme:'t-tete',badge:'Pas de saignement',label:'Pas de saignement',prob:0.70,steps:["Vérifier l'intégrité de la protection","Effectuer une vérification cognitive","Demander nom, date, position","Si OK — reprise du combat","Rendre compte au chef de section"]},
    {key:'sang',theme:'t-hemo',badge:'Saignement détecté',label:'Saignement tête',prob:0.30,steps:["Appliquer un bandage sur la plaie","Effectuer une vérification cognitive","Demander nom, date, position","Si OK — reprise du combat","Rendre compte au chef de section"]},
  ],
};

let zone=null,timerInterval=null;

function sel(z){
  zone=z;
  document.querySelectorAll('.zone-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('btn-'+z).classList.add('sel');
  document.getElementById('go-btn').disabled=false;
  reset(false);
}

function diagnose(){
  if(!zone)return;
  const type=ZONES[zone].type;
  const bl=BLESSURES[type];
  const r=Math.random();
  let cum=0,chosen=null;
  for(const b of bl){cum+=b.prob;if(r<=cum){chosen=b;break;}}
  if(!chosen)chosen=bl[bl.length-1];

  document.getElementById('idle').style.display='none';
  const rw=document.getElementById('result-wrap');
  rw.className='result-wrap show';
  document.getElementById('diag-block').className='diag-block '+chosen.theme;
  document.getElementById('res-badge').textContent=chosen.badge;
  document.getElementById('res-title').textContent=chosen.label;
  document.getElementById('res-zone').textContent='Zone : '+ZONES[zone].label;

  const ul=document.getElementById('steps-list');
  ul.innerHTML='';
  chosen.steps.forEach((s,i)=>{
    const li=document.createElement('li');
    li.className='step-item';
    li.innerHTML=`<span class="step-num">${i+1}</span><span>${s}</span>`;
    ul.appendChild(li);
  });

  renderMCC(type);

  document.getElementById('timer-block').classList.remove('show');
  document.getElementById('verdict').className='';
  document.getElementById('verdict').style.display='none';
  clearInterval(timerInterval);
  if(chosen.key==='card') startTimer();
}

function renderMCC(type){
  const data=MCC_DATA[type];
  const el=document.getElementById('mcc-table');
  el.innerHTML='';
  const colors=['green','orange','red'];
  colors.forEach(c=>{
    const d=data[c];
    let html=`<div class="mcc-col ${c}"><div class="mcc-head"><span class="mcc-dot"></span>${d.label}</div>`;
    d.cols.forEach(sec=>{
      html+=`<div class="mcc-section"><div class="mcc-section-label">${sec.title}</div>`;
      sec.items.forEach(it=>{ html+=`<div class="mcc-item">${it}</div>`; });
      html+=`</div>`;
    });
    html+=`</div>`;
    el.innerHTML+=html;
  });
}

function startTimer(){
  const DURATION=180;
  let remaining=DURATION;
  const survive=Math.random()<0.5;
  document.getElementById('timer-block').classList.add('show');
  updateTimer(remaining,DURATION);
  timerInterval=setInterval(()=>{
    remaining--;
    updateTimer(remaining,DURATION);
    if(remaining<=0){
      clearInterval(timerInterval);
      document.getElementById('timer-block').classList.remove('show');
      showVerdict(survive);
    }
  },1000);
}

function updateTimer(remaining,total){
  const m=Math.floor(remaining/60),s=remaining%60;
  document.getElementById('timer-digits').textContent=m+':'+(s<10?'0':'')+s;
  const pct=remaining/total*100;
  const bar=document.getElementById('timer-bar');
  bar.style.width=pct+'%';
  bar.style.background=pct>50?'#7F77DD':pct>20?'#EF9F27':'#E24B4A';
}

function showVerdict(alive){
  const v=document.getElementById('verdict');
  v.style.display='flex';
  if(alive){
    v.className='show alive';
    document.getElementById('verdict-icon').className='ti ti-heart';
    document.getElementById('verdict-icon').style.color='#97C459';
    document.getElementById('verdict-title').textContent='Blessé sauvé';
    document.getElementById('verdict-sub').textContent='Le MCE a fonctionné — évacuation immédiate';
  } else {
    v.className='show dead';
    document.getElementById('verdict-icon').className='ti ti-skull';
    document.getElementById('verdict-icon').style.color='#E24B4A';
    document.getElementById('verdict-title').textContent='Blessé décédé';
    document.getElementById('verdict-sub').textContent='Malgré le MCE — arrêt impossible à réverser';
  }
}

function reset(full=true){
  clearInterval(timerInterval);
  document.getElementById('idle').style.display='flex';
  document.getElementById('result-wrap').className='result-wrap';
  document.getElementById('timer-block').classList.remove('show');
  document.getElementById('verdict').className='';
  document.getElementById('verdict').style.display='none';
  if(full){
    zone=null;
    document.querySelectorAll('.zone-btn').forEach(b=>b.classList.remove('sel'));
    document.getElementById('go-btn').disabled=true;
  }
}
</script>
